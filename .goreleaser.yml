# GoReleaser config for diesel.
#
# Builds:
#   - macOS  : self-contained .app bundle (darwin/arm64)
#   - Windows: plain .zip containing diesel.exe (windows/amd64)
#
# Snapshot build (no git tag needed):
#   goreleaser release --snapshot --clean
# Tagged release:
#   git tag v0.1.0 && goreleaser release --clean
#
# Requirements on the build host:
#   macOS  : Homebrew qt (brew install qt), Xcode CLT, Node 20+/npm
#   Windows: TDM-GCC-64 or MinGW-w64 (for CGo), Node 20+/npm

version: 2

project_name: diesel

before:
  hooks:
    - go mod tidy
    # Fail fast if npm is missing — required by go generate to build the Svelte frontend.
    - sh -c 'command -v npm >/dev/null || { echo "npm not found — install Node 20+ before building" >&2; exit 1; }'
    # Build the Svelte frontend into web/dist so //go:embed picks it up.
    - go generate ./...

builds:
  # ── macOS .app bundle ────────────────────────────────────────────────────────
  - id: diesel-macos
    main: ./cmd/diesel
    # Binary placed inside the .app skeleton so the archive step captures it.
    binary: diesel.app/Contents/MacOS/diesel
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    # Restricted to arm64: Homebrew's Qt is single-arch.
    goarch: [arm64]
    flags:
      - -trimpath
      - -tags goolm
    ldflags:
      - -s -w
    hooks:
      pre:
        # Fail fast if macdeployqt is missing — required to bundle Qt frameworks.
        - sh -c 'command -v macdeployqt >/dev/null || { echo "macdeployqt not found — brew install qt" >&2; exit 1; }'
      post:
        - cmd: bash scripts/macos-bundle.sh "{{ .Path }}"

  # ── Windows .exe ─────────────────────────────────────────────────────────────
  - id: diesel-windows
    main: ./cmd/diesel
    binary: diesel
    env:
      - CGO_ENABLED=1
    goos: [windows]
    goarch: [amd64]
    flags:
      - -trimpath
      - -tags goolm
    ldflags:
      - -s -w

archives:
  - id: macos
    builds: [diesel-macos]
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_macos_{{ .Arch }}"
    files:
      - src: dist/diesel_darwin_*/diesel.app/Contents/Info.plist
        dst: diesel.app/Contents/Info.plist
      - src: dist/diesel_darwin_*/diesel.app/Contents/Frameworks
        dst: diesel.app/Contents/Frameworks
      - src: dist/diesel_darwin_*/diesel.app/Contents/PlugIns
        dst: diesel.app/Contents/PlugIns
      - src: dist/diesel_darwin_*/diesel.app/Contents/Resources
        dst: diesel.app/Contents/Resources

  - id: windows
    builds: [diesel-windows]
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_windows_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Disable the GitHub release step until you wire this up to a repo.
release:
  disable: true
